<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>mera tutor.ai - Human-Led. AI-Powered. Online Tutoring.</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="app-container">
        <!-- Header Section -->
        <header class="header">
            <div class="header-nav">
                <div class="brand">
                    <img src="logo.png" alt="mera tutor.ai Logo" class="logo-img">
                </div>
            </div>

            <div class="promo-badge">
                <span class="badge">NEW COURSE</span>
                <div class="stars">
                    <i data-lucide="star" class="star-filled"></i>
                    <i data-lucide="star" class="star-filled"></i>
                    <i data-lucide="star" class="star-filled"></i>
                    <i data-lucide="star" class="star-filled"></i>
                    <i data-lucide="star" class="star-filled"></i>
                </div>
            </div>

            <h1 class="main-title">Build Math<br>Confidence.</h1>

            <button class="preview-btn">
                <div class="play-icon">
                    <i data-lucide="play" fill="currentColor"></i>
                </div>
                <span>Watch class preview</span>
            </button>
            <div class="math-bg-elements">
                <span class="math-symbol symbol-1">∑</span>
                <span class="math-symbol symbol-2">π</span>
                <span class="math-symbol symbol-3">∫</span>
                <span class="math-symbol symbol-4">√</span>
                <span class="math-symbol symbol-5">∞</span>
            </div>
        </header>

        <!-- Form Section -->
        <main class="content">
            <div class="form-group row compact">
                <div class="input-wrapper">
                    <label>STUDENT NAME</label>
                    <input type="text" placeholder="Alex" value="Alex">
                </div>
                <div class="input-wrapper">
                    <label>PARENT PHONE</label>
                    <input type="tel" placeholder="(555) 000-0000">
                </div>
            </div>

            <div class="form-group compact">
                <label>GRADE LEVEL</label>
                <div class="grade-selector">
                    <button class="grade-btn active">1</button>
                    <button class="grade-btn">2</button>
                    <button class="grade-btn">3</button>
                    <button class="grade-btn">4</button>
                    <button class="grade-btn">5</button>
                    <button class="grade-btn">6</button>
                </div>
            </div>

            <!-- Date Picker -->
            <div class="form-group compact">
                <label>SELECT DATE</label>
                <div class="date-picker-widget">
                    <button class="cal-nav date-nav" id="prev-week"><i data-lucide="chevron-left"
                            size="16"></i></button>
                    <div class="date-scroll" id="date-scroll">
                        <!-- Dates injected by JS -->
                    </div>
                    <button class="cal-nav date-nav" id="next-week"><i data-lucide="chevron-right"
                            size="16"></i></button>
                </div>
            </div>

            <!-- Time Slot Picker -->
            <div class="form-group compact">
                <label>SELECT TIME SLOT</label>
                <div class="time-slots-grid" id="time-slots-grid">
                    <!-- Time slots injected by JS -->
                </div>
            </div>
        </main>

        <!-- Footer Section -->
        <footer class="footer compact">
            <button class="enroll-btn interactive-btn">
                <span class="btn-text">Book your demo</span>
                <div class="arrow-circle">
                    <i data-lucide="arrow-right"></i>
                </div>
            </button>
            <div class="security-note">
                <i data-lucide="lock" size="14"></i>
                <span>Secure SSL Encryption</span>
            </div>
        </footer>
    </div>

    <script src="main.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
